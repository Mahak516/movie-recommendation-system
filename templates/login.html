<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | AURAREC AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card bg-dark border-secondary p-4 shadow" style="width: 350px;">
        <h3 class="text-center text-primary fw-bold mb-4">Login</h3>
        <form method="POST">
            <input type="email" name="email" class="form-control bg-dark text-white mb-3" placeholder="Email" required>
            <input type="password" name="password" class="form-control bg-dark text-white mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Sign In</button>
        </form>
    </div>
</body>
</html>
