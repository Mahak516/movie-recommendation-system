<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search: {{ query }} | AURAREC AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent-red: #E50914; --bg-black: #080808; }
        body { background-color: var(--bg-black); color: white; padding-top: 100px; font-family: 'Arial', sans-serif; }
        .navbar { background: #000; padding: 15px 0; }
        .movie-card { transition: 0.4s; cursor: pointer; border-radius: 4px; overflow: hidden; background: #141414; border: none; }
        .movie-card:hover { transform: scale(1.1); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .card-img { height: 350px; object-fit: cover; }
        .section-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 30px; }
    </style>
</head>
<body>

<nav class="navbar fixed-top px-5">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-danger fs-3" href="/">CINESTREAM <span class="text-white">AI</span></a>
        <form class="d-flex w-50" action="/search" method="GET">
            <div class="input-group rounded-1 overflow-hidden" style="border: 1px solid #444;">
                <input class="form-control border-0 bg-dark text-white px-4" type="text" name="query" value="{{ query }}">
                <button type="submit" class="btn text-white border-0"><i class="fas fa-search"></i></button>
            </div>
        </form>
    </div>
</nav>

<div class="container-fluid px-5">
    <h3 class="section-title">Results for: <span class="text-danger">"{{ query }}"</span></h3>
    
    {% if results %}
    <div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-4">
        {% for m in results %}
        <div class="col">
            <a href="/movie/{{ m.movieId }}" class="text-decoration-none">
                <div class="movie-card h-100">
                    <img src="{{ m.poster }}" class="card-img w-100" alt="{{ m.title }}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
                    <div class="p-2">
                        <div class="fw-bold text-white text-truncate">{{ m.title }}</div>
                        <small class="text-muted">{{ m.year }} | ⭐ {{ m.rating }}</small>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="text-center py-5">
        <h2 class="text-muted">Bhai, koi movie nahi mili! 😅</h2>
        <p>Try searching for "Salman Khan" or "Action"</p>
        <a href="/" class="btn btn-danger mt-3">Back to Home</a>
    </div>
    {% endif %}
</div>

</body>
</html>
